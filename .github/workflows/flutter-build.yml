name: Flutter Multi-Platform Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --target-platform android-arm --release
      
      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-arm32-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error

  linux-arm32-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - run: flutter pub get

      # Run inside ARM32 emulation
      - name: Build Linux ARM32
        uses: pguyot/arm-runner-action@v2
        with:
          commands: |
            git clone https://github.com/flutter/flutter.git -b stable
            export PATH="$PATH:`pwd`/flutter/bin"
            flutter --version
            flutter pub get
            flutter build linux --target-platform linux-arm --release

      - name: Upload Linux ARM32 build
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm32-bundle
          path: build/linux/arm/release/bundle/


  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build web --release
      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: build/windows/x64/runner/Release/
          if-no-files-found: error
